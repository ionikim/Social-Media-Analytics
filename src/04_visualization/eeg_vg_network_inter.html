<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EEG Visibility Graph Network</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#07070f; color:#ccc; font-family:'Courier New',monospace; display:flex; flex-direction:column; height:100vh; }
#header { padding:10px 20px; border-bottom:1px solid #151525; display:flex; align-items:center; gap:12px; flex-shrink:0; }
#header h1 { font-size:12px; color:#555; letter-spacing:.12em; text-transform:uppercase; }
#phase { padding:3px 10px; border-radius:3px; font-size:11px; letter-spacing:.08em; transition:all .5s; }
.pre { background:rgba(40,100,220,.15); color:#4d9fff; border:1px solid rgba(40,100,220,.25); }
.ict { background:rgba(220,60,30,.15); color:#ff5533; border:1px solid rgba(220,60,30,.25); }
#metrics { margin-left:auto; display:flex; gap:20px; }
.met { text-align:right; }
.met-label { font-size:9px; color:#333; text-transform:uppercase; letter-spacing:.08em; }
.met-val { font-size:16px; font-weight:bold; transition:color .4s; }
#main { display:flex; flex:1; overflow:hidden; }
#sidebar { width:180px; border-right:1px solid #151525; padding:14px; overflow-y:auto; flex-shrink:0; }
#sidebar h2 { font-size:9px; color:#333; text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px; }
.elec-item { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.elec-dot { width:8px; height:8px; border-radius:50%; transition:all .4s; flex-shrink:0; }
.elec-name { font-size:10px; color:#555; width:28px; }
.elec-bar-bg { flex:1; height:3px; background:#111; border-radius:2px; }
.elec-bar { height:3px; border-radius:2px; transition:width .4s, background .4s; }
.elec-deg { font-size:9px; color:#333; width:26px; text-align:right; }
#canvas-wrap { flex:1; position:relative; }
canvas { display:block; }
#controls { padding:10px 20px; border-top:1px solid #151525; display:flex; align-items:center; gap:14px; flex-shrink:0; }
#play-btn { width:30px; height:30px; border-radius:50%; background:#4d9fff; border:none; cursor:pointer; font-size:14px; color:#fff; transition:background .2s; }
#play-btn:hover { background:#3388ee; }
#tl { flex:1; position:relative; height:32px; cursor:pointer; }
#tl-bg { position:absolute; top:50%; transform:translateY(-50%); width:100%; height:2px; background:#151525; border-radius:1px; }
#tl-pre { position:absolute; top:50%; transform:translateY(-50%); height:2px; background:#4d9fff; border-radius:1px; width:50%; opacity:.4; }
#tl-ict { position:absolute; top:50%; transform:translateY(-50%); height:2px; background:#ff5533; border-radius:1px; left:50%; width:50%; opacity:.4; }
#tl-fill { position:absolute; top:50%; transform:translateY(-50%); height:2px; background:#fff; width:0%; opacity:.6; }
#tl-sz { position:absolute; top:4px; bottom:4px; width:1px; background:rgba(255,85,51,.6); left:50%; }
#tl-cursor { position:absolute; top:50%; transform:translate(-50%,-50%); width:10px; height:10px; border-radius:50%; background:#fff; left:0%; transition:left .15s; }
.tl-tick { position:absolute; bottom:0; font-size:9px; color:#333; transform:translateX(-50%); }
#time-lbl { font-size:12px; color:#555; min-width:52px; }
#spd { font-size:10px; color:#333; display:flex; align-items:center; gap:5px; }
#spd input { width:70px; accent-color:#4d9fff; }
#thresh { font-size:10px; color:#333; display:flex; align-items:center; gap:5px; }
#thresh input { width:70px; accent-color:#4d9fff; }
#legend { font-size:9px; color:#333; display:flex; gap:12px; align-items:center; }
.leg { display:flex; align-items:center; gap:4px; }
.leg-line { width:20px; height:2px; }
</style>
</head>
<body>
<div id="header">
  <h1>EEG Visibility Graph Network · CHB01 · 23 Electrodes</h1>
  <div id="phase" class="pre">PRE-ICTAL</div>
  <div id="metrics">
    <div class="met"><div class="met-label">Time</div><div class="met-val" id="m-t" style="color:#555">0s</div></div>
    <div class="met"><div class="met-label">Mean VG degree</div><div class="met-val" id="m-d">0.00</div></div>
    <div class="met"><div class="met-label">Mean connectivity</div><div class="met-val" id="m-c">0.00</div></div>
    <div class="met"><div class="met-label">Active edges</div><div class="met-val" id="m-e">0</div></div>
  </div>
</div>
<div id="main">
  <div id="sidebar">
    <h2>VG Degree per electrode</h2>
    <div id="elec-list"></div>
  </div>
  <div id="canvas-wrap"><canvas id="c"></canvas></div>
</div>
<div id="controls">
  <button id="play-btn" onclick="togglePlay()">▶</button>
  <div id="tl">

    <div id="tl-pre"></div>
    <div id="tl-ict"></div>
    <div id="tl-fill"></div>
    <div id="tl-sz" title="Seizure onset"></div>
    <div id="tl-cursor"></div>
    <div class="tl-tick" style="left:0%">0s</div>
    <div class="tl-tick" style="left:16.7%">5s</div>
    <div class="tl-tick" style="left:33.3%">10s</div>
    <div class="tl-tick" style="left:50%;color:#ff5533">⚡15s</div>
    <div class="tl-tick" style="left:66.7%">20s</div>
    <div class="tl-tick" style="left:83.3%">25s</div>
    <div class="tl-tick" style="left:100%">30s</div>
  </div>
  <div id="time-lbl">t = 0s</div>
  <div id="thresh">Edge threshold <input type="range" id="thr" min="0" max="95" value="30" step="5"><span id="thr-val">0.30</span></div>
  <div id="spd">Speed <input type="range" id="spd-in" min="200" max="1800" value="800" step="100"></div>
  <div id="legend">
    <div class="leg"><div class="leg-line" style="background:#4d9fff"></div>Pre-ictal</div>
    <div class="leg"><div class="leg-line" style="background:#ff5533"></div>Ictal</div>
    <div class="leg"><span style="font-size:8px">Node size = VG degree · Edge thickness = correlation</span></div>
  </div>
</div>

const POS=[
  [.5,.05],[.55,.05],[.15,.18],[.35,.15],[.5,.12],[.65,.15],[.85,.18],

function resize(){
  const wrap=document.getElementById('canvas-wrap');
  cv.width=wrap.clientWidth;
  cv.height=wrap.clientHeight;
  draw(W);
}
window.addEventListener('resize',resize);
setTimeout(resize,50);

function nodeColor(t, ictal){
  if(ictal){
    const r=Math.round(80+t*175), g=Math.round(20+t*30), b=Math.round(10+t*20);
    return `rgb(${r},${g},${b})`;
  } else {
    const r=Math.round(10+t*40), g=Math.round(50+t*100), b=Math.round(120+t*135);
    return `rgb(${r},${g},${b})`;
  }
}

function edgeColor(w, ictal){
  if(ictal) return `rgba(255,85,51,${0.08+w*0.7})`;
  return `rgba(77,159,255,${0.06+w*0.6})`;
}

function draw(w){
  const cw=cv.width, ch=cv.height;
  ctx.fillStyle='#07070f';
  ctx.fillRect(0,0,cw,ch);

  const ictal=w>=SZ;
  const thr=parseInt(document.getElementById('thr').value)/100;
  const deg=D.deg; // (23, 30)
  const adj=D.adj[w]; // (23, 23)

  const PAD=60;
  const cx2=cw/2, cy2=ch/2;
  const RX=(cw/2-PAD)*0.92, RY=(ch/2-PAD)*0.92;

  // Compute node positions
  const px=POS.map(p=>PAD+p[0]*(cw-2*PAD));
  const py=POS.map(p=>PAD+p[1]*(ch-2*PAD));

  // Head outline
  ctx.beginPath();
  ctx.ellipse(cx2,cy2,RX*0.92,RY*0.95,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.025)';
  ctx.lineWidth=1;
  ctx.stroke();

  // Nose
  ctx.beginPath();
  ctx.moveTo(cx2-12,PAD+8);
  ctx.lineTo(cx2,PAD-6);
  ctx.lineTo(cx2+12,PAD+8);
  ctx.strokeStyle='rgba(255,255,255,0.025)';
  ctx.lineWidth=1;
  ctx.stroke();

  // Ears
  [[PAD-8,cy2],[cw-PAD+8,cy2]].forEach(([ex,ey])=>{
    ctx.beginPath();
    ctx.ellipse(ex,ey,8,14,0,0,Math.PI*2);
    ctx.stroke();
  });

  // Compute degrees and max
  const curDeg=Array.from({length:NE},(_,i)=>D.deg[i][w]);
  const maxDeg=Math.max(...curDeg,0.001);

  // Draw edges first (behind nodes)
  for(let i=0;i<NE;i++){
    for(let j=i+1;j<NE;j++){
      const wt=adj[i][j];
      if(wt<thr) continue;
      const t=(wt-thr)/(1-thr);
      ctx.beginPath();
      ctx.moveTo(px[i],py[i]);
      ctx.lineTo(px[j],py[j]);
      ctx.strokeStyle=edgeColor(t,ictal);
      ctx.lineWidth=0.5+t*4;
      ctx.stroke();
    }
  }

  // Draw nodes
  curDeg.forEach((d,i)=>{
    const t=d/maxDeg;
    const r=4+t*18;
    // Glow
    const grd=ctx.createRadialGradient(px[i],py[i],0,px[i],py[i],r*2.5);
    const col=nodeColor(t,ictal);
    grd.addColorStop(0,col.replace('rgb','rgba').replace(')',',0.4)'));
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(px[i],py[i],r*2.5,0,Math.PI*2);
    ctx.fillStyle=grd;
    ctx.fill();

    // Node
    ctx.beginPath();
    ctx.arc(px[i],py[i],r,0,Math.PI*2);
    ctx.fillStyle=col;
    ctx.fill();

    // Label
    ctx.font=`bold ${Math.max(8,Math.min(11,r))}px Courier New`;
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(LB[i],px[i],py[i]);
  });

  // Active edges count
  let activeEdges=0;
  for(let i=0;i<NE;i++) for(let j=i+1;j<NE;j++) if(adj[i][j]>=thr) activeEdges++;
  const meanDeg=curDeg.reduce((a,b)=>a+b,0)/NE;
  const flatAdj=[];
  for(let i=0;i<NE;i++) for(let j=i+1;j<NE;j++) flatAdj.push(adj[i][j]);
  const meanConn=flatAdj.reduce((a,b)=>a+b,0)/flatAdj.length;

  // Update UI
  document.getElementById('m-t').textContent=w<SZ?`${w}s`:`+${w-SZ}s`;
  document.getElementById('m-d').textContent=meanDeg.toFixed(2);
  document.getElementById('m-d').style.color=ictal?'#ff5533':'#4d9fff';
  document.getElementById('m-c').textContent=meanConn.toFixed(2);
  document.getElementById('m-c').style.color=ictal?'#ff5533':'#4d9fff';
  document.getElementById('m-e').textContent=activeEdges;

  const badge=document.getElementById('phase');
  badge.textContent=ictal?'ICTAL':'PRE-ICTAL';
  badge.className=ictal?'ict':'pre';

  // Sidebar
  curDeg.forEach((d,i)=>{
    const t=d/maxDeg;
    const col=nodeColor(t,ictal);
    const pct=(t*100).toFixed(1)+'%';
    const dot=document.getElementById(`dot-${i}`);
    const bar=document.getElementById(`bar-${i}`);
    const dv=document.getElementById(`dv-${i}`);
    if(dot){dot.style.background=col;dot.style.boxShadow=`0 0 4px ${col}`;}
    if(bar){bar.style.width=pct;bar.style.background=col;}
    if(dv) dv.textContent=d.toFixed(2);
  });

  // Timeline
  const pct=(w/(NW-1))*100;
  document.getElementById('tl-fill').style.width=pct+'%';
  document.getElementById('tl-cursor').style.left=pct+'%';
  document.getElementById('time-lbl').textContent=`t = ${w<SZ?w+'s':'+`'+(w-SZ)+'s'}`;
}

function togglePlay(){
  playing=!playing;
  document.getElementById('play-btn').textContent=playing?'⏸':'▶';
  if(playing) step(); else clearTimeout(timer);
}

function step(){
  if(!playing) return;
  W=(W+1)%NW;
  draw(W);
  const delay=2000-parseInt(document.getElementById('spd-in').value);
  timer=setTimeout(step,delay);
}

document.getElementById('tl').addEventListener('click',e=>{
  const r=e.currentTarget.getBoundingClientRect();
  W=Math.round(((e.clientX-r.left)/r.width)*(NW-1));
  draw(W);
});

document.getElementById('thr').addEventListener('input',e=>{
  document.getElementById('thr-val').textContent=(e.target.value/100).toFixed(2);
  draw(W);
});

document.getElementById('thr-val').textContent='0.30';
draw(0);
</script>
</body>
</html>
